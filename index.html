<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1a1a1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="成分分析">
<title>シャンプー成分分析</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif; background: #f5f5f0; color: #1a1a1a; font-size: 15px; padding-bottom: 40px; }
.header { background: #1a1a1a; padding: 18px 20px 16px; position: sticky; top: 0; z-index: 10; }
.header h1 { font-size: 17px; font-weight: 600; color: #fff; }
.header p { font-size: 12px; color: #aaa; margin-top: 2px; }
.container { max-width: 640px; margin: 0 auto; padding: 16px; }
.card { background: #fff; border-radius: 16px; padding: 18px; margin-bottom: 14px; border: 1px solid #e8e8e4; }

/* アップロードエリア */
.upload-area { border: 2px dashed #ddd; border-radius: 14px; padding: 30px 16px; text-align: center; cursor: pointer; background: #fafafa; transition: background 0.15s; }
.upload-area:active { background: #f0f0ec; }
.upload-area .icon { font-size: 36px; margin-bottom: 10px; }
.upload-area p { font-size: 15px; color: #555; font-weight: 500; }
.upload-area p.sub { font-size: 12px; color: #aaa; margin-top: 5px; font-weight: 400; }
input[type=file] { display: none; }

/* プレビュー */
.previews { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 14px; }
.preview-wrap { position: relative; width: calc(33.3% - 6px); aspect-ratio: 1; }
.preview-wrap img { width: 100%; height: 100%; object-fit: cover; border-radius: 10px; border: 1px solid #e8e8e4; }
.preview-wrap .del { position: absolute; top: -6px; right: -6px; width: 22px; height: 22px; background: #1a1a1a; color: #fff; border: none; border-radius: 50%; font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; line-height: 1; }
.add-more { width: calc(33.3% - 6px); aspect-ratio: 1; border: 2px dashed #ddd; border-radius: 10px; background: #fafafa; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 24px; color: #aaa; }

.btn { width: 100%; padding: 15px; background: #1a1a1a; color: #fff; border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 14px; transition: opacity 0.15s; }
.btn:disabled { opacity: 0.35; cursor: not-allowed; }
.btn:active:not(:disabled) { opacity: 0.8; }
.hint { font-size: 12px; color: #aaa; margin-top: 8px; line-height: 1.6; text-align: center; }
.status { text-align: center; font-size: 13px; color: #666; margin: 12px 0 0; min-height: 20px; }
.spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #ddd; border-top-color: #666; border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 6px; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }

/* 結果 */
.result-section { display: none; }
.result-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.result-header h2 { font-size: 16px; font-weight: 600; }
.count-badge { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; padding: 4px 12px; border-radius: 99px; font-size: 12px; font-weight: 600; }
.impression-card { background: #1a1a1a; color: #fff; border-radius: 14px; padding: 16px; margin-bottom: 14px; }
.impression-card h3 { font-size: 12px; color: #aaa; margin-bottom: 8px; font-weight: 500; letter-spacing: 0.5px; }
.impression-card p { font-size: 14px; line-height: 1.75; }
.item-card { background: #fff; border-radius: 14px; border: 1px solid #e8e8e4; padding: 14px; margin-bottom: 10px; }
.item-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 10px; }
.item-name { font-size: 15px; font-weight: 600; line-height: 1.3; }
.item-en { font-size: 11px; color: #999; margin-top: 3px; }
.badge { display: inline-block; padding: 3px 10px; border-radius: 99px; font-size: 11px; font-weight: 600; white-space: nowrap; flex-shrink: 0; }
.b-surfactant { background: #dbeafe; color: #1d4ed8; }
.b-moisturize { background: #dcfce7; color: #166534; }
.b-condition { background: #ede9fe; color: #6d28d9; }
.b-preserve { background: #fef3c7; color: #92400e; }
.b-fragrance { background: #fce7f3; color: #9d174d; }
.b-uv { background: #fff7ed; color: #9a3412; }
.b-antioxidant { background: #f0fdf4; color: #14532d; }
.b-ph { background: #f1f5f9; color: #334155; }
.b-other { background: #f3f4f6; color: #374151; }
.safe-safe { background: #dcfce7; color: #166534; }
.safe-caution { background: #fef3c7; color: #92400e; }
.safe-danger { background: #fee2e2; color: #991b1b; }
.safe-other { background: #f3f4f6; color: #374151; }
.row { display: grid; grid-template-columns: 60px 1fr; gap: 3px 8px; font-size: 13px; margin-bottom: 7px; align-items: start; }
.row:last-child { margin-bottom: 0; }
.row-label { color: #bbb; font-size: 11px; padding-top: 2px; }
.formula { font-family: monospace; background: #f5f5f0; padding: 1px 7px; border-radius: 5px; font-size: 12px; }
</style>
</head>
<body>

<div class="header">
  <h1>🧴 シャンプー成分分析</h1>
  <p>ボトルの写真を撮って送るだけでOK</p>
</div>

<div class="container">
  <div class="card">
    <div class="upload-area" id="upload-area" onclick="document.getElementById('file-input').click()">
      <div class="icon">📷</div>
      <p>タップして写真を選択</p>
      <p class="sub">複数枚まとめて選べます（最大5枚）</p>
    </div>
    <input type="file" id="file-input" accept="image/*" multiple onchange="handleFiles(event)">

    <div class="previews" id="previews"></div>

    <button class="btn" id="analyze-btn" onclick="analyze()" disabled>分析する</button>
    <p class="hint">ボトルが丸くて1枚では成分が切れる場合は<br>角度を変えて複数枚撮ってください</p>
    <p class="status" id="status"></p>
  </div>

  <div class="result-section" id="result-section">
    <div class="result-header">
      <h2>分析結果</h2>
      <span class="count-badge" id="count-badge"></span>
    </div>
    <div class="impression-card" id="impression-card" style="display:none;">
      <h3>✦ 全体的な印象</h3>
      <p id="impression-text"></p>
    </div>
    <div id="result-list"></div>
  </div>
</div>

<script>
const MAX = 5;
let files = []; // {base64, type}

function handleFiles(e) {
  const selected = Array.from(e.target.files).slice(0, MAX - files.length);
  selected.forEach(file => {
    if (files.length >= MAX) return;
    const reader = new FileReader();
    reader.onload = ev => {
      files.push({ base64: ev.target.result.split(',')[1], type: file.type || 'image/jpeg', src: ev.target.result });
      renderPreviews();
    };
    reader.readAsDataURL(file);
  });
  e.target.value = '';
}

function removeFile(i) {
  files.splice(i, 1);
  renderPreviews();
}

function renderPreviews() {
  const container = document.getElementById('previews');
  let html = files.map((f, i) => `
    <div class="preview-wrap">
      <img src="${f.src}">
      <button class="del" onclick="removeFile(${i})">×</button>
    </div>`).join('');
  if (files.length < MAX) {
    html += `<div class="add-more" onclick="document.getElementById('file-input').click()">＋</div>`;
  }
  container.innerHTML = html;
  document.getElementById('analyze-btn').disabled = files.length === 0;
  // アップロードエリアを隠す
  document.getElementById('upload-area').style.display = files.length > 0 ? 'none' : 'block';
}

function roleBadge(role) {
  if (!role) return '<span class="badge b-other">その他</span>';
  const map = {'界面活性剤':'surfactant','洗浄':'surfactant','保湿':'moisturize','保湿剤':'moisturize','コンディショニング':'condition','補修':'condition','防腐剤':'preserve','保存料':'preserve','香料':'fragrance','紫外線':'uv','酸化防止':'antioxidant','pH':'ph'};
  const key = Object.keys(map).find(k => role.includes(k));
  return `<span class="badge b-${key ? map[key] : 'other'}">${role}</span>`;
}

function safetyBadge(s) {
  if (!s) return '-';
  const cls = (s.includes('安全')||s.includes('低刺激')) ? 'safe' : (s.includes('要注意')||s.includes('アレルギー')) ? 'danger' : s.includes('注意') ? 'caution' : 'other';
  return `<span class="badge safe-${cls}">${s}</span>`;
}

function renderResults(items, impression) {
  document.getElementById('count-badge').textContent = `${items.length}種類`;
  if (impression) {
    document.getElementById('impression-text').textContent = impression;
    document.getElementById('impression-card').style.display = 'block';
  }
  document.getElementById('result-list').innerHTML = items.map(item => `
    <div class="item-card">
      <div class="item-top">
        <div>
          <div class="item-name">${item.name||'-'}</div>
          <div class="item-en">${item.en||''}</div>
        </div>
        ${roleBadge(item.role)}
      </div>
      <div class="row"><span class="row-label">化学式</span><span>${item.formula ? `<span class="formula">${item.formula}</span>` : '-'}</span></div>
      <div class="row"><span class="row-label">特徴</span><span>${item.feature||'-'}</span></div>
      <div class="row"><span class="row-label">安全性</span><span>${safetyBadge(item.safety)}</span></div>
    </div>`).join('');
  document.getElementById('result-section').style.display = 'block';
  setTimeout(() => document.getElementById('result-section').scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
}

async function analyze() {
  if (files.length === 0) return;
  const btn = document.getElementById('analyze-btn');
  btn.disabled = true;
  document.getElementById('status').innerHTML = '<span class="spinner"></span>分析中...少々お待ちください';
  document.getElementById('result-section').style.display = 'none';

  // 複数画像をまとめてメッセージに
  const content = files.map(f => ({
    type: 'image',
    source: { type: 'base64', media_type: f.type, data: f.base64 }
  }));
  content.push({ type: 'text', text: `これらの画像はすべて同じシャンプー製品の成分表示を複数の角度から撮影したものです。全ての画像を合わせて成分を読み取り、重複なく分析してください。` });

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: `あなたはシャンプー・ヘアケア製品の成分専門家です。画像から成分を読み取って分析し、必ず以下のJSON形式のみを返してください。前置き・説明・マークダウン記法は一切不要です。

{
  "impression": "全体的な印象を2〜4文で。処方の特徴・品質・敏感肌への適性などを具体的に",
  "ingredients": [
    {"name":"成分名","en":"英語名","formula":"化学式（不明は-）","role":"主な役割（界面活性剤/保湿剤/コンディショニング/防腐剤/香料/紫外線吸収剤/酸化防止剤/pH調整/その他）","feature":"特徴を1〜2文","safety":"安全性（安全・低刺激・注意・要注意・アレルギー注意など）"}
  ]
}`,
        messages: [{ role: 'user', content }]
      })
    });
    const data = await res.json();
    const text = (data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('');
    const result = JSON.parse(text.replace(/```json|```/g,'').trim());
    renderResults(result.ingredients, result.impression);
    document.getElementById('status').textContent = '';
  } catch(e) {
    document.getElementById('status').textContent = '分析に失敗しました。もう一度お試しください。';
  }
  btn.disabled = false;
}
</script>
</body>
</html>
